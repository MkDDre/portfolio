services:
  frontend:
    container_name: frontend-dev
    image: frontend-prod
    build:
      context: ./frontend
    ports:
      - 5172:5172
    depends_on:
      api:
        condition: service_started

  api:
    container_name: api-dev
    image: api-prod
    build: ./api
    ports:
      - 3000:3000
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["java", "-jar", "app.jar", "--spring.profiles.active=test"]

  db:
    image: postgres:latest
    container_name: db-dev
    environment:
      POSTGRES_DB: projetdev
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pwd
    ports:
      - "5446:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d projetdev"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  reverse-proxy:
    container_name: reverse-proxy-dev
    image: nginx:alpine
    ports:
      - 80:80
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_started
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf