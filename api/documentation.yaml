openapi: 3.1.0
info:
  title: Portfolio API
  description: API Spring Boot pour auth, services et reservations.
  version: 1.0.0
servers:
  - url: http://localhost:3000

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Inscrire un client
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Utilisateur inscrit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Requete invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Email deja utilise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Se connecter
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Authentification reussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Requete invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Credentials invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Utilisateur introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /service:
    post:
      tags: [Service]
      summary: Creer un service
      description: Accessible uniquement aux SERVICE_PROVIDER.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Service'
      responses:
        '201':
          description: Service cree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '403':
          description: Acces refuse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /service/{id}:
    get:
      tags: [Service]
      summary: Recuperer un service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Service trouve
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '404':
          description: Service introuvable

  /service/validated/all:
    get:
      tags: [Service]
      summary: Lister les services valides
      responses:
        '200':
          description: Liste des services valides
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Service'

  /service/my-services:
    get:
      tags: [Service]
      summary: Lister mes services
      description: Accessible uniquement aux SERVICE_PROVIDER.
      responses:
        '200':
          description: Liste des services de l'utilisateur courant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Service'
        '403':
          description: Acces refuse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /reservation:
    post:
      tags: [Reservation]
      summary: Creer une reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
      responses:
        '201':
          description: Reservation creee
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '400':
          description: Requete invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Service ou utilisateur introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /reservation/{id}/cancel:
    patch:
      tags: [Reservation]
      summary: Annuler une reservation
      description: Annulation possible seulement 48h a l'avance.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Reservation annulee
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '400':
          description: Delai d'annulation depasse ou reservation deja annulee
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Reservation introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /reservation/my:
    get:
      tags: [Reservation]
      summary: Lister mes reservations
      description: Retourne les reservations de l'utilisateur authentifie, triees par date decroissante.
      responses:
        '200':
          description: Liste des reservations de l'utilisateur courant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reservation'
        '401':
          description: Non authentifie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Utilisateur introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: myStrongPassword

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: new-user@example.com
        password:
          type: string
          example: myStrongPassword

    AuthResponse:
      type: object
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        role:
          type: string
          enum: [ADMIN, CUSTOMER, SERVICE_PROVIDER]

    Service:
      type: object
      properties:
        id:
          type: integer
          format: int64
        serviceTitle:
          type: string
        price:
          type: number
          format: double
        status:
          type: string
          enum: [VALIDATED, PENDING, DENIED, MASKED]

    CreateReservationLineRequest:
      type: object
      required: [serviceId]
      properties:
        serviceId:
          type: integer
          format: int64
        date:
          type: string
          format: date-time

    CreateReservationRequest:
      type: object
      required: [reservationDate, lines]
      properties:
        reservationDate:
          type: string
          format: date-time
        lines:
          type: array
          items:
            $ref: '#/components/schemas/CreateReservationLineRequest'

    Reservation:
      type: object
      properties:
        id:
          type: integer
          format: int64
        reservationDate:
          type: string
          format: date-time
        total_price:
          type: number
          format: double
        status:
          type: string
          enum: [FUTUR, PAST, DURING, CANCELED]

    ApiError:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        fieldErrors:
          type: object
          additionalProperties:
            type: string

